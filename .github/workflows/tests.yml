name: Tests

on:
  push:
    branches: [ main, structures ]
  pull_request:
    branches: [ main, structures ]

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Setup Mambaforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        miniforge-version: latest
        channels: conda-forge
        conda-remove-defaults: "true"
        environment-file: .ci_support/environment.yml

    - name: Ensure Python lammps module is available
      shell: bash -el {0}
      run: |
        echo "=== Python environment diagnostics (pre-check) ==="
        which python
        python --version
        python - <<'PY'
        import sys, site
        print("sys.executable:", sys.executable)
        print("site-packages:", site.getsitepackages())
        print("sys.path:", sys.path)
        PY

        if ! python - <<'PY'
        import importlib.util
        import sys
        if importlib.util.find_spec("lammps") is None:
            sys.exit(1)
        print("lammps already importable")
        PY
        then
          echo "lammps missing from environment, trying conda install..."
          conda install -n phase-diagram-workflows-test -y -c conda-forge lammps
        fi

        if ! python - <<'PY'
        import importlib.util
        import sys
        if importlib.util.find_spec("lammps") is None:
            sys.exit(1)
        print("lammps import check passed after conda install")
        PY
        then
          echo "Conda lammps unavailable, cloning and compiling LAMMPS from source..."
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libopenmpi-dev
          rm -rf /tmp/lammps-src /tmp/lammps-build
          git clone --depth 1 https://github.com/lammps/lammps.git /tmp/lammps-src
          cmake -S /tmp/lammps-src/cmake -B /tmp/lammps-build \
            -D BUILD_SHARED_LIBS=on \
            -D CMAKE_BUILD_TYPE=Release \
            -D LAMMPS_EXCEPTIONS=on \
            -D PKG_MANYBODY=on
          cmake --build /tmp/lammps-build -j2

          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "Target site-packages: $SITE_PACKAGES"

          sudo cp /tmp/lammps-build/liblammps.so /usr/local/lib/
          sudo ldconfig

          if [ -d "/tmp/lammps-src/python/lammps" ]; then
            echo "Found package layout"
            sudo cp -r /tmp/lammps-src/python/lammps "$SITE_PACKAGES/"
          else
            echo "Found single file layout"
            sudo cp /tmp/lammps-src/python/lammps.py "$SITE_PACKAGES/"
          fi

          echo "PYTHONPATH=/tmp/lammps-src/python:${PYTHONPATH}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/usr/local/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
        fi

        echo "=== Final lammps verification ==="
        python - <<'PY'
        import sys
        import lammps
        print("sys.path:", sys.path)
        print("lammps location:", lammps.__file__)
        L = lammps.lammps()
        print("LAMMPS instance created successfully")
        L.close()
        PY

    - name: Install package
      shell: bash -el {0}
      run: pip install .[dev,executor]

    - name: Run tests
      shell: bash -el {0}
      run: python -m pytest --cov=src/phase_diagram_workflows --cov-report=xml:coverage.xml tests/ -v

    - name: Upload coverage reports to Codecov
      if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false
