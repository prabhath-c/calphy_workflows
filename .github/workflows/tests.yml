name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Setup Mambaforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        miniforge-version: latest
        channels: conda-forge
        conda-remove-defaults: "true"
        environment-file: .ci_support/environment.yml

    - name: Ensure Python lammps module is available
      shell: bash -el {0}
      run: |
        if ! python - <<'PY'
        import importlib.util
        import sys
        if importlib.util.find_spec("lammps") is None:
            sys.exit(1)
        print("lammps already importable")
        PY
        then
          echo "lammps missing from environment, trying conda install..."
          conda install -n phase-diagram-workflows-test -y -c conda-forge lammps
        fi

        if ! python - <<'PY'
        import importlib.util
        import sys
        if importlib.util.find_spec("lammps") is None:
            sys.exit(1)
        print("lammps import check passed after conda install")
        PY
        then
          echo "Conda lammps unavailable, cloning and compiling LAMMPS from source..."
          sudo apt-get update
          sudo apt-get install -y cmake g++ make
          rm -rf /tmp/lammps-src /tmp/lammps-build
          git clone --depth 1 --branch stable https://github.com/lammps/lammps.git /tmp/lammps-src
          cmake -S /tmp/lammps-src/cmake -B /tmp/lammps-build \
            -D BUILD_SHARED_LIBS=on \
            -D CMAKE_BUILD_TYPE=Release \
            -D LAMMPS_EXCEPTIONS=on
          cmake --build /tmp/lammps-build --target install-python -j2
        fi

        python - <<'PY'
        import importlib.util
        if importlib.util.find_spec("lammps") is None:
            raise SystemExit("lammps Python module is still missing after install/build attempts")
        print("Final check: lammps is importable")
        PY

    - name: Install package
      run: pip install .[dev,executor]

    - name: Run tests
      run: python -m pytest --cov=src/phase_diagram_workflows tests/ -v

    - name: Upload coverage reports to Codecov
      if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
